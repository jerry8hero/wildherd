# 爬宠博主自动回复模板配置
# 用于常见问题的自动回复参考

templates:
  # 饲养基础类
  - trigger: "怎么养"
    keywords: ["怎么养", "如何养", "养法", "饲养"]
    response: "新手推荐看我的【新手入门】系列，从0开始教你养龟～ 有任何具体问题可以在评论区说说，给你详细解答！"

  - trigger: "吃什么"
    keywords: ["吃什么", "喂什么", "食物", "饲料"]
    response: "不同品种的龟饮食有差异哦～ 常见的有龟粮、小鱼虾、蔬菜等。想了解具体品种的话，评论区告诉我！"

  - trigger: "水温"
    keywords: ["水温", "温度", "加热", "冬眠"]
    response: "龟类对水温要求比较高，大多数需要25-30度左右。具体品种具体分析，你养的是什么品种呀？"

  - trigger: "冬眠"
    keywords: ["冬眠", "过冬", "冬天"]
    response: "不是所有龟都需要冬眠哦，具体要看品种和当地气候。有些龟苗第一年不建议冬眠～"

  # 价格购买类
  - trigger: "多少钱"
    keywords: ["多少钱", "价格", "哪里买", "购买"]
    response: "不同品种价格差异很大可以从几十块到几百块甚至上千。可以评论区说说你的预算，给你推荐～"

  - trigger: "在哪买"
    keywords: ["在哪买", "哪里有", "购买渠道", "网店"]
    response: "建议去正规宠物店或者信誉好的养殖户那里买。网购的话选择支持开食再确认收货的商家～"

  # 健康问题类
  - trigger: "生病"
    keywords: ["生病", "病了", "不吃东西", "没精神"]
    response: "龟龟状态不好建议先观察具体症状：是否拒食、排便是否正常、眼睛是否明亮等。描述详细点帮你分析～"

  - trigger: "白眼"
    keywords: ["白眼", "眼睛白", "睁不开"]
    response: "白眼病通常是水质问题导致的，建议换水、加温、干养配合氯霉素眼药水。严重的话建议就医！"

  - trigger: "腐皮"
    keywords: ["腐皮", "烂皮", "皮肤"]
    response: "腐皮一般也是水质问题，需要加温干养，涂抹聚维酮碘消毒。保持好水质是关键！"

  # 安全提醒类
  - trigger: "咬人"
    keywords: ["咬人", "咬", "凶"]
    response: "鳄龟类的咬合力很强，安全第一！绝对不要徒手抓取，移动时用长柄钳子。品种不一样性格也不一样～"

  - trigger: "放生"
    keywords: ["放生", "野外", "野生"]
    response: "重要提醒：鳄龟是外来入侵物种，放生野外是违法行为！会对本土生态造成严重破坏。养了就要负责到底！"

  # 互动引导类
  - trigger: "新手"
    keywords: ["新手", "第一次", "入门"]
    response: "欢迎入坑养龟！建议先从本土龟种开始积累经验，比如草龟、巴西龟。关注我，新手入门系列帮你避坑！"

  - trigger: "求关注"
    keywords: ["关注", "粉丝", "三连"]
    response: "感谢支持！点个关注不迷路，我会持续分享爬宠知识。有问题评论区见～"

  - trigger: "感谢"
    keywords: ["谢谢", "感谢", "学习了"]
    response: "能帮到大家很开心！你们的支持是我最大的动力，继续努力给大家带来更多干货内容！"

# 回复优先级配置
priority:
  negative: 0      # 负面评论优先处理
  safety: 1       # 安全相关问题
  health: 2       # 健康问题
  purchase: 3      # 购买咨询
  basic: 4        # 基础问题
  interaction: 5  # 互动类
